<div id="login-form" class="w-full max-w-md mx-auto">
  <div class="mb-10 text-center">
    <h2
      class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-linear-to-r from-main-300 to-secondary-500 drop-shadow-[0_0_10px_rgba(255,215,0,0.2)]"
    >
      Welcome Back
    </h2>
    <p class="mt-3 text-sm font-medium text-neutral-400">Sign in to ignite your network</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 relative z-10">
    <div class="flex flex-col gap-2 relative group">
      <label
        for="email"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-main-400"
      >
        Email Address
      </label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="Enter your email..."
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3.5 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-300 focus:border-main-500 focus:shadow-[0_0_15px_rgba(255,215,0,0.15)] focus:bg-neutral-900/90"
      />
    </div>

    <div class="flex flex-col gap-2 relative group">
      <label
        for="password"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-main-400"
      >
        Password
      </label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Enter your password..."
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3.5 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-300 focus:border-main-500 focus:shadow-[0_0_15px_rgba(255,215,0,0.15)] focus:bg-neutral-900/90"
      />
    </div>

    <div class="flex items-center justify-between mt-[-8px]">
      <a
        href="#"
        class="text-xs font-bold text-main-400 hover:text-main-300 transition-colors hover:underline underline-offset-4 decoration-main-500/30"
      >
        Forgot password?
      </a>
    </div>

    <button
      type="submit"
      [disabled]="loginForm.invalid"
      class="mt-2 w-full rounded-xl  bg-linear-to-r from-main-500 to-main-400 hover:from-main-400 hover:to-main-300 px-5 py-4 text-sm font-black uppercase tracking-[0.15em] text-neutral-900 transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_5px_20px_rgba(255,215,0,0.25)] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-none"
    >
      Sign In
    </button>
  </form>
</div>
