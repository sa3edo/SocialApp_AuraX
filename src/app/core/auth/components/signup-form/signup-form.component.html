<div id="signup-form" class="w-full max-w-md mx-auto">
  <div class="mb-8 text-center">
    <h2
      class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-linear-to-r from-secondary-400 to-secondary-200 drop-shadow-[0_0_10px_rgba(0,255,255,0.2)]"
    >
      Join <span class="text-main-500">Aura</span><span class="text-secondary-500">X</span>
    </h2>
    <p class="mt-2 text-sm font-medium text-neutral-400">Create an account to start connecting</p>
  </div>

  <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 relative z-10">
    <div class="flex flex-col gap-1.5 relative group">
      <label
        for="name"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-secondary-400"
      >
        Full Name
      </label>
      <input
        id="name"
        type="text"
        formControlName="name"
        placeholder="Enter your name..."
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-300 focus:border-secondary-500 focus:shadow-[0_0_15px_rgba(0,255,255,0.15)] focus:bg-neutral-900/90"
      />
    </div>

    <div class="flex flex-col gap-1.5 relative group">
      <label
        for="username"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-secondary-400"
      >
        Username
      </label>
      <input
        id="username"
        type="text"
        formControlName="username"
        placeholder="Choose a username..."
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-300 focus:border-secondary-500 focus:shadow-[0_0_15px_rgba(0,255,255,0.15)] focus:bg-neutral-900/90"
      />
    </div>

    <div class="flex flex-col gap-1.5 relative group">
      <label
        for="email"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-secondary-400"
      >
        Email Address
      </label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="Enter your email..."
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-300 focus:border-secondary-500 focus:shadow-[0_0_15px_rgba(0,255,255,0.15)] focus:bg-neutral-900/90"
      />
    </div>

    <div class="flex flex-col gap-1.5 relative group">
      <label
        for="gender"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-secondary-400"
      >
        Gender
      </label>
      <select
        id="gender"
        type="text"
        formControlName="gender"
        placeholder="Enter your gender..."
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3 text-neutral-200 placeholder-red-500 outline-none transition-all duration-300 focus:border-secondary-500 focus:shadow-[0_0_15px_rgba(0,255,255,0.15)] focus:bg-neutral-900/90"
      >
        <option value="" disabled selected>Select Gender...</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
    </div>

    <div class="flex flex-col gap-1.5 relative group">
      <label
        for="dateOfBirth"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-secondary-400"
      >
        Date of Birth
      </label>
      <input
        id="dateOfBirth"
        type="date"
        formControlName="dateOfBirth"
        style="color-scheme: dark"
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-300 focus:border-secondary-500 focus:shadow-[0_0_15px_rgba(0,255,255,0.15)] focus:bg-neutral-900/90"
      />
    </div>

    <div class="flex flex-col gap-1.5 relative group">
      <label
        for="gender"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-secondary-400"
      >
        Gender
      </label>
      <select
        id="gender"
        formControlName="gender"
        style="color-scheme: dark"
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3 text-neutral-200 outline-none transition-all duration-300 focus:border-secondary-500 focus:shadow-[0_0_15px_rgba(0,255,255,0.15)] focus:bg-neutral-900/90 appearance-none"
      >
        <option value="" disabled hidden>Select Gender...</option>
        <option value="male" class="bg-neutral-800">Male</option>
        <option value="female" class="bg-neutral-800">Female</option>
      </select>
    </div>

    <div class="flex flex-col gap-1.5 relative group">
      <label
        for="password"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-secondary-400"
      >
        Password
      </label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Create a password..."
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-300 focus:border-secondary-500 focus:shadow-[0_0_15px_rgba(0,255,255,0.15)] focus:bg-neutral-900/90"
      />
    </div>

    <div class="flex flex-col gap-1.5 relative group">
      <label
        for="rePassword"
        class="text-[11px] font-black uppercase tracking-widest text-neutral-400 ml-1 transition-colors group-focus-within:text-secondary-400"
      >
        Confirm Password
      </label>
      <input
        id="rePassword"
        type="password"
        formControlName="rePassword"
        placeholder="Confirm your password..."
        class="w-full rounded-xl border border-neutral-700/50 bg-neutral-900/60 px-5 py-3 text-neutral-200 placeholder-neutral-600 outline-none transition-all duration-300 focus:border-secondary-500 focus:shadow-[0_0_15px_rgba(0,255,255,0.15)] focus:bg-neutral-900/90"
      />
    </div>

    <button
      [disabled]="signupForm.invalid || isLoading()"
      class="mt-4 w-full rounded-xl flex justify-center items-center gap-2 bg-linear-to-r from-main-500 to-main-400 hover:from-main-400 hover:to-main-300 px-5 py-4 text-sm font-black uppercase tracking-[0.15em] text-neutral-900 transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_5px_20px_rgba(255,215,0,0.25)] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-none"
    >
      @if (isLoading()) {
        <i class="pi pi-spin pi-spinner" style="font-size: 1.5rem"></i>
      }

      Create Account
    </button>
  </form>
</div>
